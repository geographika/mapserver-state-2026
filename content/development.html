<section data-markdown>
    <script type="text/template">
        ## Extra Parameters

        ```mapfile
        WEB
            VALIDATION
            'token' '^[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+$'
            'user_id' '^[0-9]+$' # only allow integers
            'default_token' 'MISSING'
            'default_user_id' '-1'
            END
            METADATA
            "ows_extra_params" "token=%TOKEN%&user_id=%USER_ID%"
        ```

    </script>
</section>

            WEB
                METADATA
                    "ows_sld_enabled" "false"
        ```

<section data-markdown>
    <script type="text/template">

        - Outbound server access
        - Read-only database access, only tables required
        - Service accounts for database and network access
        - Ensure `VALIDATION` on any [Run-time Substitution](https://mapserver.org/cgi/runsub.html) variables
        - Don't create Mapfiles based on unvalidated user input

    </script>
</section>

        ## MapServer 8.8 Performance Improvements

        - [Add new fallback_to_map_extent to avoid layer extent calculations](https://github.com/MapServer/MapServer/pull/7449)
        - [Allow `use_default_extent_for_getfeature` to be set at the MAP level](https://github.com/MapServer/MapServer/pull/7453)
        - [WMS: rework building of the layer tree to make it faster, and understandable!](https://github.com/MapServer/MapServer/pull/7410)

          + On a 103 MB Mapfile with 6,130 layers and 3 level of nesting, WMS GetCapabilities response goes from **56** seconds to **5** seconds

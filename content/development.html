        ```bash
        CONFIG
            ENV

            END
            MAPS
                ARCGIS "/etc/mapserver/arcgis.map"
                CLUSTERS "/etc/mapserver/clusters.map"
                CONTOURS "/etc/mapserver/contours.map"
                COUNTRIES "/etc/mapserver/countries.map"
                DIRECTION "/etc/mapserver/direction.map"
                GDALG "/etc/mapserver/gdalg.map"
                LAKES "/etc/mapserver/lakes.map"
                LANDUSE "/etc/mapserver/landuse.map"
                LINES "/etc/mapserver/lines.map"
                OGCAPI-FEATURES "/etc/mapserver/ogcapi-features.map"
                OTHER-PROJECTIONS "/etc/mapserver/other-projections.map"
                POINTS "/etc/mapserver/points.map"
                POLYGONS "/etc/mapserver/polygons.map"
                POSTGIS "/etc/mapserver/postgis.map"
                RAILWAYS "/etc/mapserver/railways.map"
                RASTER "/etc/mapserver/raster.map"
                RASTER-PIPELINE "/etc/mapserver/raster-pipeline.map"
                SLD "/etc/mapserver/sld.map"
                STAC "/etc/mapserver/stac.map"
                STARS "/etc/mapserver/stars.map"
                TILES "/etc/mapserver/tiles.map"
                TIMISOARA "/etc/mapserver/timisoara.map"
                VECTOR-TILES "/etc/mapserver/vector-tiles.map"
                WCS "/etc/mapserver/wcs.map"

            ...

<section data-markdown style="font-size:0.65em;">
    <script type="text/template">
        ## GDAL Vector Pipeline Support

        Mapfile with inline pipeline

        ```mapfile
        LAYER
            NAME "buffered_roads"
            TYPE POLYGON
            CONNECTIONTYPE OGR
            # displayed on multiple lines for clarity
            CONNECTION '{"type": "gdal_streamed_alg","command_line": "gdal vector pipeline 
            ! read /etc/mapserver/data/osm/roads.fgb 
            ! geom buffer --distance=0.0001"}'
            DATA "0"
            CLASS
                STYLE
                ...
            END
        END
        ```

        <div>
        <object
            type="image/svg+xml"
            data="images/roads.gdalg.svg"
            width="100%"
            height="200">
        </object>
        </div>

    </script>
</section>

<section data-markdown style="font-size:0.65em;">
    <script type="text/template">
        ## GDAL Raster Pipeline Support

        Mapfile

        ```mapfile
        LAYER
            NAME "dtm-pipeline"
            DATA "data/raster/clipped.gdalg.json"
            ...
        END
        ```

        clipped.gdalg.json (displayed on mutliple lines for clarity)

        ```json
        {
            "type": "gdal_streamed_alg",
            "command_line": "gdal raster pipeline 
            ! read /etc/mapserver/data/raster/clipped.tif
            ! color-map --color-map /etc/mapserver/data/raster/color-map-percentage.txt
            ! blend --operator=hsv-value --overlay 
                [ read /etc/mapserver/data/raster/clipped.tif ! hillshade -z 2 ] "
        }
        ```

        <div>
        <object
            type="image/svg+xml"

<section data-markdown style="font-size:0.65em;">
    <script type="text/template">
        ## [`ows_extra_params`](https://mapserver.org/ogc/ogc_api.html#web-object-metadata) <sup><a href="https://github.com/MapServer/MapServer/pull/7360">*</a></sup>

         <img class="bordered" src="images/api_links.png" style="width: 50%; vertical-align:middle;" />

         https://example.com/ogcapi/?f=html&token=eyJ9.e30.SflKxw&user_id=12345

        ```mapfile
        WEB
            VALIDATION
                'token' '^[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+\.[A-Za-z0-9\-_]+$'
                'user_id' '^[0-9]+$' # only allow integers
                'default_token' 'MISSING'
                'default_user_id' '-1'
            END
            METADATA
                "ows_extra_params" "token=%TOKEN%&user_id=%USER_ID%"
                # the above parameters are automatically added to allowed list of parameters
                "oga_compliance_mode" "true" # unknown parameters will throw an error
        ```

    </script>
</section>

<section data-markdown data-background="images/lock.svg" data-background-opacity="0.05" data-background-size="50%" style="font-size:0.85em;">
    <script type="text/template">
        ## Security Best Practices

        - Restrict **outbound** server access
        - **Read-only** database access, only tables required
        - Service accounts for database and network access
        - Ensure `VALIDATION` on any [Run-time Substitution](https://mapserver.org/cgi/runsub.html) variables
        - Don't create Mapfiles based on unvalidated user input

    </script>
</section>

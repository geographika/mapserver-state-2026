        ## MapServer 8.8 Performance Improvements

        - [Add new fallback_to_map_extent to avoid layer extent calculations](https://github.com/MapServer/MapServer/pull/7449)
        - [Allow `use_default_extent_for_getfeature` to be set at the MAP level](https://github.com/MapServer/MapServer/pull/7453)
        - [WMS: rework building of the layer tree to make it faster, and understandable!](https://github.com/MapServer/MapServer/pull/7410)

          + On a 103 MB Mapfile with 6,130 layers and 3 level of nesting, WMS GetCapabilities response goes from **56** seconds to **5** seconds
    </script>

          - 5310243.30613897
        units: METERS
        shapepath: data
        imagecolor:
          - 255
          - 255
          - 255
        imagetype: PNG
        symbols:
          - __type__: symbol

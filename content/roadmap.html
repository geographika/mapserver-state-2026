    <script type="text/template">
        ## OGCAPI Features: CQL2

        CQL2: Common Query Language 2, an OGC standard for defining filters on feature data

        - **CQL2-text**

        `ogcapi/collections/buildings/items?filter=building+LIKE+'%hospital%'&filter-lang=cql2-text`

        - **CQL2-JSON**

        ```json
        {
            "op": "like",
            "args": [
            { "property": "building" },
            "%hospital%"
            ]
        }
        ```

        - **Simple Filtering**

        `ogcapi/collections/buildings/items?building=hospital`

    </script>
</section>

<section data-markdown style="font-size:0.65em;">
    <script type="text/template">
        ## Support for non-EPSG Coordinate Reference Systems

        ```scala
        MAP
            PROJECTION
                "ESRI:53009"
            END
            WEB
                METADATA
                    "ows_srs" "ESRI:53009 EPSG:4326"
                END
            END
            LAYER
                NAME "cities"
                TYPE POINT
                PROJECTION
                    "ESRI:53009"
                END
            ...
        ```

        Sample requests:

        ```
        # WMS
        https://example.com/?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetMap&LAYERS=countries&CRS=ESRI:53009&BBOX=-27029863.5,-12247906.8984375,27029863.5,12247906.8984375...
        # WFS
        https://example.com/?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature&TYPENAMES=ms:cities&SRSNAME=ESRI:53009&BBOX=-20366251.317708332,-10499881.871744791,20366251.317708332,10499881.871744791...
        # WCS
        https://example.com/?&SERVICE=WCS&VERSION=2.0.1&REQUEST=GetCoverage&COVERAGEID=raster&SUBSETTINGCRS=http://www.opengis.net/def/crs/ESRI/0/53009&OUTPUTCRS=http://www.opengis.net/def/crs/ESRI/0/53009&SUBSET=x(-18019909,18019909)&SUBSET=y(-8155885.896354166,8155885.896354166)&SCALESIZE=x(1536),y(695)...
        ```

            <small><a href="https://mapserver.github.io/getting-started-with-mapserver/advanced/other-projections/">Workshop Tutorial Link</a></small>

<section data-markdown>
    <script type="text/template">
        ### RoadMap

        Ordered by high priority votes:

        1. OGC Maps API Implementation (**39** users)
        2. Improving Performance (**28** users)
        3. OGC Tiles API Implementation (**24** users)
        4. More examples in the documentation (**24** users)
        5. OGC Styles API implementation (**20** users)

    </script>
</section>

<section data-markdown>
    <script type="text/template">
        ### What could make MapServer easier to use?

        Common themes:

        - Improved Documentation and examples - see [MapServer Workshop](https://mapserver.github.io/getting-started-with-mapserver/)
        - Official Docker images
        - GUI for authoring
        - Definitely NOT a graphical UI
        - QGIS integration
        - Syntax checker - see [mappyfile validation](https://mappyfile.readthedocs.io/en/latest/validation.html)

    </script>
</section>

<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <title>Security advisories by year</title>
  <desc>Stacked bar chart of security advisories from 2022 to 2026, broken down by published, in review, and rejected status.</desc>

  <!-- background -->
  <rect width="680" height="400" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="36" font-size="16" font-weight="500" fill="#0b0b0b">Security advisories</text>

  <!-- legend -->
  <rect x="40" y="52" width="10" height="10" rx="2" fill="#2a78d6"/>
  <text x="55" y="62" font-size="12" fill="#52514e">Published</text>
  <rect x="130" y="52" width="10" height="10" rx="2" fill="#eda100"/>
  <text x="145" y="62" font-size="12" fill="#52514e">In review</text>
  <rect x="220" y="52" width="10" height="10" rx="2" fill="#e34948"/>
  <text x="235" y="62" font-size="12" fill="#52514e">Rejected</text>

  <!-- axes -->
  <!-- y gridlines and labels: max = 17, step = 2 -->
  <!-- chart area: x=60..640, y=85..340  height=255 -->

  <!-- gridlines at 0,2,4,6,8,10,12,14,16 -->
  <line x1="60" y1="340" x2="640" y2="340" stroke="#c3c2b7" stroke-width="1"/>
  <line x1="60" y1="310" x2="640" y2="310" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="60" y1="280" x2="640" y2="280" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="60" y1="250" x2="640" y2="250" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="60" y1="220" x2="640" y2="220" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="60" y1="190" x2="640" y2="190" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="60" y1="160" x2="640" y2="160" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="60" y1="130" x2="640" y2="130" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="60" y1="100" x2="640" y2="100" stroke="#e1e0d9" stroke-width="1"/>

  <!-- y labels -->
  <text x="50" y="344" font-size="12" fill="#898781" text-anchor="end">0</text>
  <text x="50" y="314" font-size="12" fill="#898781" text-anchor="end">2</text>
  <text x="50" y="284" font-size="12" fill="#898781" text-anchor="end">4</text>
  <text x="50" y="254" font-size="12" fill="#898781" text-anchor="end">6</text>
  <text x="50" y="224" font-size="12" fill="#898781" text-anchor="end">8</text>
  <text x="50" y="194" font-size="12" fill="#898781" text-anchor="end">10</text>
  <text x="50" y="164" font-size="12" fill="#898781" text-anchor="end">12</text>
  <text x="50" y="134" font-size="12" fill="#898781" text-anchor="end">14</text>
  <text x="50" y="104" font-size="12" fill="#898781" text-anchor="end">16</text>

  <!-- scale: 1 unit = 15px. bottom y=340 -->
  <!-- bar width=60, group spacing, 5 groups across 580px => center offsets -->
  <!-- centers: 2022=144, 2023=260, 2024=376, 2025=492, 2026=608 -->

  <!-- 2022: published=1 -->
  <rect x="114" y="325" width="60" height="15" rx="4" fill="#2a78d6"/>
  <text x="144" y="358" font-size="13" fill="#898781" text-anchor="middle">2022</text>

  <!-- 2023: published=2 -->
  <rect x="230" y="310" width="60" height="30" rx="4" fill="#2a78d6"/>
  <text x="260" y="358" font-size="13" fill="#898781" text-anchor="middle">2023</text>

  <!-- 2024: published=3 -->
  <rect x="346" y="295" width="60" height="45" rx="4" fill="#2a78d6"/>
  <text x="376" y="358" font-size="13" fill="#898781" text-anchor="middle">2024</text>

  <!-- 2025: published=1 -->
  <rect x="462" y="325" width="60" height="15" rx="4" fill="#2a78d6"/>
  <text x="492" y="358" font-size="13" fill="#898781" text-anchor="middle">2025</text>

  <!-- 2026: published=7, in_review=5, rejected=5 => total=17 -->
  <!-- published: 7 units = 105px, bottom=340, top=235 -->
  <rect x="578" y="235" width="60" height="105" rx="4" fill="#2a78d6"/>
  <!-- in_review: 5 units = 75px, bottom=235, top=160 -->
  <rect x="578" y="160" width="60" height="75" rx="4" fill="#eda100"/>
  <!-- rejected: 5 units = 75px, bottom=160, top=85 -->
  <rect x="578" y="85" width="60" height="75" rx="4" fill="#e34948"/>
  <text x="608" y="358" font-size="13" fill="#898781" text-anchor="middle">2026</text>

  <!-- value labels on 2026 segments -->
  <text x="608" y="292" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">7</text>
  <text x="608" y="202" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">5</text>
  <text x="608" y="127" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">5</text>

  <!-- value labels on other bars -->
  <text x="144" y="320" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">1</text>
  <text x="260" y="325" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">2</text>
  <text x="376" y="318" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">3</text>
  <text x="492" y="320" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">1</text>
</svg>
